<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIR Suite — Cámara</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #fff;
      border-bottom: 2px solid #e0e0e0;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.5rem;
      color: #2c3e50;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e74c3c;
    }

    .status-dot.connected {
      background: #27ae60;
    }

    main {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .module {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .module-header {
      background: #3498db;
      color: #fff;
      padding: 1rem 1.5rem;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .module-body {
      padding: 1.5rem;
    }

    .camera-container {
      position: relative;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      aspect-ratio: 16/10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .camera-container img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    .camera-placeholder {
      color: #666;
      font-size: 1.2rem;
      text-align: center;
    }

    .camera-info {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .info-card {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 4px;
      border-left: 3px solid #3498db;
    }

    .info-card h3 {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-card p {
      font-size: 1.1rem;
      color: #2c3e50;
      font-weight: 600;
    }

    .controls {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3498db;
      color: #fff;
    }

    .btn-primary:hover {
      background: #2980b9;
    }

    .btn-secondary {
      background: #95a5a6;
      color: #fff;
    }

    .btn-secondary:hover {
      background: #7f8c8d;
    }

    .log {
      margin-top: 1.5rem;
      background: #2c3e50;
      color: #ecf0f1;
      padding: 1rem;
      border-radius: 4px;
      font-family: "Courier New", monospace;
      font-size: 0.85rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-entry {
      margin-bottom: 0.25rem;
    }

    .log-entry.error {
      color: #e74c3c;
    }

    .log-entry.success {
      color: #27ae60;
    }

    .log-entry.info {
      color: #3498db;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #95a5a6;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>MIR Suite — Módulo de Cámara</h1>
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Desconectado</span>
    </div>
  </header>

  <main>
    <div class="module">
      <div class="module-header">
        📷 Orbbec Gemini 335Lg
      </div>
      <div class="module-body">
        <div class="camera-container">
          <img id="camera-image" alt="Camera feed" style="display: none;">
          <div class="camera-placeholder" id="camera-placeholder">
            Esperando imagen de la cámara...
          </div>
        </div>

        <div class="camera-info">
          <div class="info-card">
            <h3>Resolución</h3>
            <p id="info-resolution">1280 × 800</p>
          </div>
          <div class="info-card">
            <h3>FPS</h3>
            <p id="info-fps">--</p>
          </div>
          <div class="info-card">
            <h3>Formato</h3>
            <p id="info-format">MJPG</p>
          </div>
          <div class="info-card">
            <h3>Conexión</h3>
            <p id="info-connection">USB 3.2</p>
          </div>
        </div>

        <div class="controls">
          <button class="btn btn-primary" onclick="toggleCamera()">
            <span id="toggle-text">Detener Cámara</span>
          </button>
          <button class="btn btn-secondary" onclick="clearLog()">
            Limpiar Log
          </button>
        </div>

        <div class="log" id="log"></div>
      </div>
    </div>
  </main>

  <footer>
    MIR Suite · Kevin (Jetson AGX Orin) · 192.168.1.75
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/roslib@1.3.0/build/roslib.min.js"></script>
  <script>
    // Configuración
    const ROSBRIDGE_URL = `ws://${window.location.hostname}:9090`;
    const CAMERA_TOPIC = '/camera/color/image_raw/compressed';
    const CAMERA_INFO_TOPIC = '/camera/color/camera_info';

    // Estado global
    let ros = null;
    let cameraListener = null;
    let cameraInfoListener = null;
    let cameraActive = true;
    let frameCount = 0;
    let lastFpsUpdate = Date.now();
    let currentFps = 0;

    // Logging
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const timestamp = new Date().toLocaleTimeString();
      entry.textContent = `[${timestamp}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
      log('Log limpiado', 'info');
    }

    // Conexión ROS
    function connectROS() {
      log(`Conectando a ${ROSBRIDGE_URL}...`, 'info');
      
      ros = new ROSLIB.Ros({
        url: ROSBRIDGE_URL
      });

      ros.on('connection', () => {
        log('Conectado a rosbridge', 'success');
        updateStatus(true);
        subscribeCamera();
      });

      ros.on('error', (error) => {
        log(`Error: ${error.message}`, 'error');
        updateStatus(false);
      });

      ros.on('close', () => {
        log('Conexión cerrada, reconectando en 5s...', 'error');
        updateStatus(false);
        setTimeout(connectROS, 5000);
      });
    }

    function updateStatus(connected) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      
      if (connected) {
        dot.classList.add('connected');
        text.textContent = 'Conectado';
      } else {
        dot.classList.remove('connected');
        text.textContent = 'Desconectado';
      }
    }

    // Suscripción a cámara
    function subscribeCamera() {
      if (cameraListener) {
        cameraListener.unsubscribe();
      }

      cameraListener = new ROSLIB.Topic({
        ros: ros,
        name: CAMERA_TOPIC,
        messageType: 'sensor_msgs/CompressedImage'
      });

      cameraListener.subscribe((msg) => {
        if (!cameraActive) return;

        const img = document.getElementById('camera-image');
        const placeholder = document.getElementById('camera-placeholder');

        img.src = `data:image/jpeg;base64,${msg.data}`;
        img.style.display = 'block';
        placeholder.style.display = 'none';

        // Calcular FPS
        frameCount++;
        const now = Date.now();
        if (now - lastFpsUpdate >= 1000) {
          currentFps = frameCount;
          frameCount = 0;
          lastFpsUpdate = now;
          document.getElementById('info-fps').textContent = `${currentFps} fps`;
        }
      });

      log(`Suscrito a ${CAMERA_TOPIC}`, 'success');

      // Suscripción a camera_info
      if (cameraInfoListener) {
        cameraInfoListener.unsubscribe();
      }

      cameraInfoListener = new ROSLIB.Topic({
        ros: ros,
        name: CAMERA_INFO_TOPIC,
        messageType: 'sensor_msgs/CameraInfo'
      });

      cameraInfoListener.subscribe((msg) => {
        // Actualizar info si es necesario
        // msg.width, msg.height, msg.distortion_model, etc.
      });

      log(`Suscrito a ${CAMERA_INFO_TOPIC}`, 'success');
    }

    function unsubscribeCamera() {
      if (cameraListener) {
        cameraListener.unsubscribe();
        cameraListener = null;
      }
      if (cameraInfoListener) {
        cameraInfoListener.unsubscribe();
        cameraInfoListener = null;
      }
      log('Cámara detenida', 'info');
    }

    // Controles
    function toggleCamera() {
      cameraActive = !cameraActive;
      const toggleText = document.getElementById('toggle-text');
      const img = document.getElementById('camera-image');
      const placeholder = document.getElementById('camera-placeholder');

      if (cameraActive) {
        toggleText.textContent = 'Detener Cámara';
        subscribeCamera();
        log('Cámara reanudada', 'success');
      } else {
        toggleText.textContent = 'Iniciar Cámara';
        unsubscribeCamera();
        img.style.display = 'none';
        placeholder.style.display = 'block';
        placeholder.textContent = 'Cámara detenida';
        document.getElementById('info-fps').textContent = '--';
      }
    }

    // Inicialización
    window.addEventListener('load', () => {
      log('MIR Suite — Módulo de Cámara inicializado', 'info');
      connectROS();
    });
  </script>
</body>
</html>
