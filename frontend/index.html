<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIR Suite</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 14px;
    }

    .header {
      background: #0d0d0d;
      padding: 12px 24px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 500;
      color: #fff;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #888;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c0392b;
    }

    .status-dot.connected {
      background: #27ae60;
    }

    .main {
      padding: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .camera-module {
      background: #242424;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }

    .module-header {
      background: #1a1a1a;
      padding: 12px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .module-title {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }

    .module-controls {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 6px 12px;
      border: 1px solid #444;
      border-radius: 3px;
      background: #2a2a2a;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover {
      background: #333;
      border-color: #555;
    }

    .btn.active {
      background: #c0392b;
      border-color: #c0392b;
      color: #fff;
    }

    .camera-view {
      background: #000;
      aspect-ratio: 16/10;
      max-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .camera-view img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    .camera-placeholder {
      color: #555;
      font-size: 13px;
    }

    .camera-stats {
      background: #1a1a1a;
      padding: 12px 16px;
      border-top: 1px solid #333;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      font-size: 12px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      color: #666;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      color: #fff;
      font-weight: 500;
    }

    .log-panel {
      margin-top: 16px;
      background: #0d0d0d;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }

    .log-header {
      background: #1a1a1a;
      padding: 8px 12px;
      border-bottom: 1px solid #333;
      font-size: 12px;
      color: #888;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-content {
      padding: 8px 12px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      max-height: 150px;
      overflow-y: auto;
      color: #aaa;
    }

    .log-entry {
      margin-bottom: 2px;
      line-height: 1.4;
    }

    .log-entry.error {
      color: #e74c3c;
    }

    .log-entry.success {
      color: #27ae60;
    }

    .log-entry.info {
      color: #3498db;
    }

    .footer {
      text-align: center;
      padding: 16px;
      color: #555;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MIR Suite</h1>
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Desconectado</span>
    </div>
  </div>

  <div class="main">
    <div class="camera-module">
      <div class="module-header">
        <div class="module-title">Orbbec Gemini 335Lg</div>
        <div class="module-controls">
          <button class="btn active" id="toggle-btn" onclick="toggleCamera()">Detener</button>
          <button class="btn" onclick="clearLog()">Limpiar</button>
        </div>
      </div>

      <div class="camera-view">
        <img id="camera-image" alt="Camera feed" style="display: none;">
        <div class="camera-placeholder" id="camera-placeholder">
          Esperando imagen...
        </div>
      </div>

      <div class="camera-stats">
        <div class="stat">
          <span class="stat-label">Resolución</span>
          <span class="stat-value">1280×800</span>
        </div>
        <div class="stat">
          <span class="stat-label">FPS</span>
          <span class="stat-value" id="info-fps">--</span>
        </div>
        <div class="stat">
          <span class="stat-label">Formato</span>
          <span class="stat-value">MJPG</span>
        </div>
        <div class="stat">
          <span class="stat-label">Conexión</span>
          <span class="stat-value">USB 3.2</span>
        </div>
      </div>
    </div>

    <div class="log-panel">
      <div class="log-header">
        <span>Log</span>
      </div>
      <div class="log-content" id="log"></div>
    </div>
  </div>

  <div class="footer">
    Kevin · Jetson AGX Orin · 192.168.1.75
  </div>

  <script src="https://cdn.jsdelivr.net/npm/roslib@1.3.0/build/roslib.min.js"></script>
  <script>
    const ROSBRIDGE_URL = `ws://${window.location.hostname}:9090`;
    const CAMERA_TOPIC = '/camera/color/image_raw/compressed';

    let ros = null;
    let cameraListener = null;
    let cameraActive = true;
    let frameCount = 0;
    let lastFpsUpdate = Date.now();
    let currentFps = 0;

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const timestamp = new Date().toLocaleTimeString();
      entry.textContent = `[${timestamp}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
      log('Log limpiado', 'info');
    }

    function connectROS() {
      log(`Conectando a ${ROSBRIDGE_URL}...`, 'info');
      
      ros = new ROSLIB.Ros({
        url: ROSBRIDGE_URL
      });

      ros.on('connection', () => {
        log('Conectado a rosbridge', 'success');
        updateStatus(true);
        subscribeCamera();
      });

      ros.on('error', (error) => {
        log(`Error: ${error.message}`, 'error');
        updateStatus(false);
      });

      ros.on('close', () => {
        log('Conexión cerrada, reconectando en 5s...', 'error');
        updateStatus(false);
        setTimeout(connectROS, 5000);
      });
    }

    function updateStatus(connected) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      
      if (connected) {
        dot.classList.add('connected');
        text.textContent = 'Conectado';
      } else {
        dot.classList.remove('connected');
        text.textContent = 'Desconectado';
      }
    }

    function subscribeCamera() {
      if (cameraListener) {
        cameraListener.unsubscribe();
      }

      cameraListener = new ROSLIB.Topic({
        ros: ros,
        name: CAMERA_TOPIC,
        messageType: 'sensor_msgs/CompressedImage'
      });

      cameraListener.subscribe((msg) => {
        if (!cameraActive) return;

        const img = document.getElementById('camera-image');
        const placeholder = document.getElementById('camera-placeholder');

        img.src = `data:image/jpeg;base64,${msg.data}`;
        img.style.display = 'block';
        placeholder.style.display = 'none';

        frameCount++;
        const now = Date.now();
        if (now - lastFpsUpdate >= 1000) {
          currentFps = frameCount;
          frameCount = 0;
          lastFpsUpdate = now;
          document.getElementById('info-fps').textContent = `${currentFps}`;
        }
      });

      log(`Suscrito a ${CAMERA_TOPIC}`, 'success');
    }

    function unsubscribeCamera() {
      if (cameraListener) {
        cameraListener.unsubscribe();
        cameraListener = null;
      }
      log('Cámara detenida', 'info');
    }

    function toggleCamera() {
      cameraActive = !cameraActive;
      const btn = document.getElementById('toggle-btn');
      const img = document.getElementById('camera-image');
      const placeholder = document.getElementById('camera-placeholder');

      if (cameraActive) {
        btn.textContent = 'Detener';
        btn.classList.add('active');
        subscribeCamera();
        log('Cámara reanudada', 'success');
      } else {
        btn.textContent = 'Iniciar';
        btn.classList.remove('active');
        unsubscribeCamera();
        img.style.display = 'none';
        placeholder.style.display = 'block';
        placeholder.textContent = 'Cámara detenida';
        document.getElementById('info-fps').textContent = '--';
      }
    }

    window.addEventListener('load', () => {
      log('MIR Suite inicializado', 'info');
      connectROS();
    });
  </script>
</body>
</html>
